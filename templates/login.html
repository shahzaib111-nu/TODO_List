{% extends 'auth_base.html' %}
{% block title %}Sign in — Taskify{% endblock %}

{% block content %}

<div class="auth-form-header">
  <h1 class="auth-form-title">Welcome back</h1>
  <p class="auth-form-sub">Sign in to your Taskify workspace.</p>
</div>

<div class="auth-card">
  <form method="POST" action="{{ url_for('login') }}" novalidate>

    <div class="field">
      <label>Username</label>
      <input type="text" name="username" class="input"
             placeholder="Your username"
             required autocomplete="username">
    </div>

    <div class="field password-field" style="margin-bottom:8px">
      <label>Password</label>
      <div class="password-input-wrap">
        <input type="password" name="password" id="loginPassword" class="input"
               placeholder="Your password"
               required autocomplete="current-password">
        <button type="button" class="password-toggle"
                onclick="togglePasswordField('loginPassword', this)"
                aria-label="Show password">
          show
        </button>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:22px">
      <input type="checkbox" name="remember" id="rem"
             style="width:15px;height:15px;accent-color:var(--p);cursor:pointer">
      <label for="rem" style="font-size:.84rem;color:var(--txt-sub);cursor:pointer;font-weight:500">Keep me signed in</label>
    </div>

    <button type="submit" class="btn btn-primary btn-w">
      Sign in <i class="bi bi-arrow-right"></i>
    </button>

  </form>
</div>

<div class="auth-link-row">
  Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
</div>

{% endblock %}
